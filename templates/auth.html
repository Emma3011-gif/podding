<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Q&A Assistant - Sign Up</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#D91C74',
                            burgundy: '#9C1456',
                            dark: '#1A1A1A',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #D91C74 0%, #9C1456 50%, #1A1A1A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-focus {
            transition: all 0.2s ease;
        }

        .input-focus:focus {
            border-color: #D91C74;
            box-shadow: 0 0 0 3px rgba(217, 28, 116, 0.1);
        }

        .btn-primary {
            transition: all 0.2s ease;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary:not(:disabled):hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(217, 28, 116, 0.3);
        }

        .social-btn {
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            background-color: #f9fafb;
            border-color: #d1d5db;
        }

        /* Smooth fade transition */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Checkbox custom style */
        .checkbox-custom {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Prevent body scroll when modal is open */
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div id="root"></div>

    <!-- React and Babel via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Icons -->
    <script src="https://unpkg.com/react-icons@4.11.0/lib/index.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Simple icon components (using SVG directly to avoid icon library issues)
        const GoogleIcon = () => (
            <svg className="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
        );

        const EmailIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        );

        const LockIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        );

        const UserIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        );

        // Input field component
        const InputField = ({ label, type, value, onChange, placeholder, icon: Icon, required = true, error }) => {
            return (
                <div className="mb-4">
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                        {label} {required && <span className="text-red-500">*</span>}
                    </label>
                    <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            {Icon && <Icon />}
                        </div>
                        <input
                            type={type}
                            value={value}
                            onChange={onChange}
                            placeholder={placeholder}
                            className={`input-focus w-full pl-10 pr-3 py-3 border ${error ? 'border-red-500' : 'border-gray-300'} rounded-lg bg-white focus:outline-none`}
                            required={required}
                        />
                    </div>
                    {error && <p className="mt-1 text-sm text-red-500">{error}</p>}
                </div>
            );
        };

        // Main Auth Component
        const AuthScreen = () => {
            const [mode, setMode] = useState('signup'); // 'signup' or 'login'
            const [formData, setFormData] = useState({
                displayName: '',
                email: '',
                password: '',
            });
            const [errors, setErrors] = useState({});
            const [termsAccepted, setTermsAccepted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitError, setSubmitError] = useState('');

            // Validation
            const isValidEmail = (email) => {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            };

            const validateForm = useCallback(() => {
                const newErrors = {};

                if (mode === 'signup') {
                    if (!formData.displayName.trim()) {
                        newErrors.displayName = 'Display name is required';
                    } else if (formData.displayName.trim().length < 2) {
                        newErrors.displayName = 'Name must be at least 2 characters';
                    }
                }

                if (!formData.email.trim()) {
                    newErrors.email = 'Email is required';
                } else if (!isValidEmail(formData.email)) {
                    newErrors.email = 'Please enter a valid email address';
                }

                if (!formData.password) {
                    newErrors.password = 'Password is required';
                } else if (formData.password.length < 6) {
                    newErrors.password = 'Password must be at least 6 characters';
                }

                if (mode === 'signup' && !termsAccepted) {
                    newErrors.terms = 'You must accept the Terms of Use and Privacy Policy';
                }

                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            }, [formData, termsAccepted, mode]);

            const isFormValid = () => {
                const hasBasicFields = formData.email && isValidEmail(formData.email) && formData.password && formData.password.length >= 6;
                if (mode === 'signup') {
                    return hasBasicFields && formData.displayName.trim().length >= 2 && termsAccepted;
                }
                return hasBasicFields;
            };

            const handleInputChange = (field) => (e) => {
                setFormData(prev => ({
                    ...prev,
                    [field]: e.target.value
                }));
                // Clear error when user starts typing
                if (errors[field]) {
                    setErrors(prev => ({ ...prev, [field]: '' }));
                }
                setSubmitError('');
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitError('');

                if (!validateForm()) {
                    return;
                }

                setIsSubmitting(true);
                setSubmitError('');

                try {
                    const endpoint = mode === 'signup' ? '/auth/signup' : '/auth/login';
                    const payload = mode === 'signup'
                        ? {
                            email: formData.email,
                            password: formData.password,
                            displayName: formData.displayName
                          }
                        : {
                            email: formData.email,
                            password: formData.password
                          };

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Authentication failed');
                    }

                    // Success!
                    if (mode === 'signup') {
                        // Show success message for signup
                        alert('🎉 Account created successfully! Welcome to PDF Q&A Assistant.');
                    }

                    // Redirect to main app
                    window.location.href = '/';

                } catch (error) {
                    setSubmitError(error.message || 'An error occurred. Please try again.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleSocialLogin = (provider) => {
                if (provider === 'Google') {
                    // Redirect to Google OAuth endpoint
                    window.location.href = '/auth/google';
                } else {
                    alert(`${provider} authentication is not yet configured. Please use email sign up or log in.`);
                }
            };

            const toggleMode = () => {
                setMode(prev => prev === 'signup' ? 'login' : 'signup');
                setErrors({});
                setSubmitError('');
                // Reset form partially
                if (mode === 'signup') {
                    setFormData({ displayName: '', email: formData.email, password: '' });
                } else {
                    setFormData({ ...formData, displayName: '' });
                }
            };

            // Check if user is already authenticated
            useEffect(() => {
                const checkAuth = async () => {
                    try {
                        const response = await fetch('/auth/check');
                        if (response.ok) {
                            // User already logged in, redirect to main app
                            window.location.href = '/';
                        }
                    } catch (error) {
                        // Not authenticated or error, stay on page
                        console.log('Not authenticated');
                    }
                };
                checkAuth();
            }, []);

            // Check for OAuth error in URL
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const error = urlParams.get('error');
                if (error) {
                    const decodedError = decodeURIComponent(error);
                    console.log('[AUTH ERROR]', decodedError);
                    console.log('[Full URL]', window.location.href);
                    setSubmitError(decodedError);
                    // Clear the error from URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }, []);

            return (
                <div className="w-full max-w-md mx-auto fade-in">
                    {/* Logo */}
                    <div className="text-center mb-8">
                        <div className="flex items-center justify-center gap-3 mb-2">
                            <svg className="w-12 h-12 text-brand-pink" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                <path d="M14 2V8H20" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                <path d="M16 13H8" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                <path d="M16 17H8" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                <path d="M10 9H8" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            <h1 className="text-4xl font-bold gradient-text mb-0">PDF Q&A Assistant</h1>
                        </div>
                        <p className="text-gray-600 text-sm">
                            {mode === 'signup' ? 'Create your account' : 'Welcome back'}
                        </p>
                    </div>

                    {/* Form Card */}
                    <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
                        <form onSubmit={handleSubmit}>
                            {mode === 'signup' && (
                                <InputField
                                    label="Display Name"
                                    type="text"
                                    value={formData.displayName}
                                    onChange={handleInputChange('displayName')}
                                    placeholder="Enter your name"
                                    icon={UserIcon}
                                    error={errors.displayName}
                                />
                            )}

                            <InputField
                                label="Email"
                                type="email"
                                value={formData.email}
                                onChange={handleInputChange('email')}
                                placeholder="you@example.com"
                                icon={EmailIcon}
                                error={errors.email}
                            />

                            <InputField
                                label="Password"
                                type="password"
                                value={formData.password}
                                onChange={handleInputChange('password')}
                                placeholder="Create a password"
                                    icon={LockIcon}
                                error={errors.password}
                            />

                            {mode === 'signup' && (
                                <div className="mb-6">
                                    <label className="flex items-start">
                                        <input
                                            type="checkbox"
                                            checked={termsAccepted}
                                            onChange={(e) => setTermsAccepted(e.target.checked)}
                                            className="checkbox-custom mt-1 mr-3 text-brand-pink focus:ring-brand-pink"
                                        />
                                        <span className="text-sm text-gray-600">
                                            I accept the <a href="/terms" className="text-brand-pink hover:underline">Terms of Use</a> and{' '}
                                            <a href="/privacy" className="text-brand-pink hover:underline">Privacy Policy</a>
                                        </span>
                                    </label>
                                    {errors.terms && <p className="mt-1 text-sm text-red-500">{errors.terms}</p>}
                                </div>
                            )}

                            {submitError && (
                                <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">
                                    {submitError}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={!isFormValid() || isSubmitting}
                                className="btn-primary w-full py-3 px-4 bg-gradient-to-r from-brand-pink to-brand-burgundy text-white font-semibold rounded-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                            >
                                {isSubmitting ? (
                                    <>
                                        <svg className="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                                        </svg>
                                        Processing...
                                    </>
                                ) : (
                                    mode === 'signup' ? 'Sign up with Email' : 'Log in'
                                )}
                            </button>
                        </form>

                        {/* Divider */}
                        <div className="relative my-6">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-gray-300"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-4 bg-white text-gray-500">or continue with</span>
                            </div>
                        </div>

                        {/* Social Buttons */}
                        <div className="space-y-3">
                            <button
                                onClick={() => handleSocialLogin('Google')}
                                className="social-btn w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-lg font-medium text-gray-700"
                            >
                                <GoogleIcon />
                                Continue with Google
                            </button>
                        </div>

                        {/* Footer */}
                        <div className="mt-8 text-center">
                            <p className="text-sm text-gray-600">
                                {mode === 'signup' ? (
                                    <>
                                        Already have an account?{' '}
                                        <button
                                            onClick={toggleMode}
                                            className="font-semibold text-brand-pink hover:text-brand-burgundy transition-colors"
                                        >
                                            Log in
                                        </button>
                                    </>
                                ) : (
                                    <>
                                        Don't have an account?{' '}
                                        <button
                                            onClick={toggleMode}
                                            className="font-semibold text-brand-pink hover:text-brand-burgundy transition-colors"
                                        >
                                            Sign up
                                        </button>
                                    </>
                                )}
                            </p>
                        </div>
                    </div>

                    {/* Bottom Text */}
                    <p className="text-center text-xs text-gray-500 mt-6">
                        By continuing, you agree to our Terms of Service and Privacy Policy
                    </p>
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<AuthScreen />, document.getElementById('root'));
    </script>
</body>
</html>
